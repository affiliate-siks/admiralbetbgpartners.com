<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#040613;
  --bg-1:#060A18;
  --bg-2:#0B1026;

  --surface: rgba(12,18,45,.9);
  --border: rgba(255,204,0,.25);

  --text:#ffffff;
  --muted:rgba(255,255,255,.7);

  --yellow:#FFCC00;
  --yellow-dark:#E6B800;

  --radius:14px;
  --shadow:0 15px 35px rgba(0,0,0,.55);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,204,0,.08), transparent 45%),
    linear-gradient(180deg,var(--bg-2) 0%,var(--bg-1) 60%,var(--bg-0) 100%);
  color:var(--text);
}

.wrapper{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:40px 50px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
  text-align:center;
}

.buttons{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
}

.btn{
  min-width:220px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:var(--radius);
  font-weight:800;
  letter-spacing:.5px;
  text-decoration:none;
  transition:.2s ease;
}

.btn-primary{
  background:linear-gradient(180deg,var(--yellow) 0%,var(--yellow-dark) 100%);
  color:#000;
  box-shadow:0 10px 20px rgba(255,204,0,.25);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 30px rgba(255,204,0,.35);
}

.btn-secondary{
  background:transparent;
  border:2px solid var(--yellow);
  color:var(--yellow);
}

.btn-secondary:hover{
  background:var(--yellow);
  color:#000;
  transform:translateY(-2px);
}

@media(max-width:600px){
  .wrapper{
    padding:30px 20px;
  }
  .btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="buttons">
    <a class="btn btn-primary" href="https://admiralbetbgaffiliates.com/partner/register">
      REGISTRACIJA
    </a>

    <a class="btn btn-secondary" href="https://admiralbetbgaffiliates.com/partner/login">
      LOGIN
    </a>
  </div>
</div>

</body>
</html>
