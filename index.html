<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Affiliate Portal</title>

    <!-- Google font sličan onom na casino stranici -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1c1c1c 0%, #0f0f0f 60%, #000000 100%);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
        }

        .container {
            text-align: center;
            background: #141414;
            padding: 60px 80px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .btn {
            display: block;
            width: 220px;
            margin: 15px auto;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(90deg, #d40000, #ff1a1a);
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
        }

        .btn-secondary {
            background: #2b2b2b;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #3a3a3a;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">Affiliate Portal</div>

        <a class="btn" href="https://admiralbetbgaffiliates.com/partner/register">
            Registracija
        </a>

        <a class="btn btn-secondary" href="https://admiralbetbgaffiliates.com/partner/login">
            Login
        </a>
    </div>
</body>
</html>
